<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalletTrack - Mis Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <h1 class="text-center text-sm font-light opacity-80">Total Mensual Proyectado (ARS)</h1>
        <div id="total-general" class="text-center text-4xl font-bold my-2">$ 0.00</div>
        <div class="flex justify-between mt-4 text-xs">
            <span id="cotizacion-dolar">Dólar Tarjeta: Cargando...</span>
            <span id="fecha-actual"></span>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 pb-20">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">
            <h2 class="text-lg font-semibold mb-4 text-gray-700">Registrar Gasto</h2>
            <div class="space-y-4">
                <input type="text" id="nombre-gasto" placeholder="¿En qué gastaste?" class="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                
                <div class="flex gap-2">
                    <input type="number" id="monto-gasto" placeholder="Monto" class="w-2/3 p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                    <select id="moneda-gasto" class="w-1/3 p-3 bg-gray-50 rounded-xl outline-none">
                        <option value="ARS">ARS</option>
                        <option value="USD">USD</option>
                    </select>
                </div>

                <div class="flex items-center gap-2 text-sm text-gray-600">
                    <input type="checkbox" id="es-cuota" onchange="toggleCuotas()">
                    <label for="es-cuota">¿Es en cuotas?</label>
                </div>

                <div id="panel-cuotas" class="hidden flex gap-2">
                    <input type="number" id="cuota-actual" placeholder="N° Cuota" class="w-1/2 p-3 bg-gray-50 rounded-xl outline-none">
                    <input type="number" id="cuotas-totales" placeholder="Total Cuotas" class="w-1/2 p-3 bg-gray-50 rounded-xl outline-none">
                </div>

                <button onclick="agregarGasto()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">
                    Agregar Gasto
                </button>
            </div>
        </div>

        <h2 class="text-gray-500 font-medium mb-3 ml-2 text-sm uppercase tracking-wider">Historial de Gastos</h2>
        <div id="lista-gastos" class="space-y-3">
            </div>
    </div>

    <script>
        let gastos = JSON.parse(localStorage.getItem('mis_gastos')) || [];
        let valorDolar = 0;

        // 1. Obtener Dólar Tarjeta en tiempo real
        async function actualizarDolar() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares/tarjeta');
                const data = await res.json();
                valorDolar = data.venta;
                document.getElementById('cotizacion-dolar').innerText = `Dólar Tarjeta: $${valorDolar}`;
                renderizarGastos();
            } catch (e) {
                console.error("Error al obtener dólar");
            }
        }

        function toggleCuotas() {
            const check = document.getElementById('es-cuota');
            document.getElementById('panel-cuotas').classList.toggle('hidden', !check.checked);
        }

        function agregarGasto() {
            const nombre = document.getElementById('nombre-gasto').value;
            const monto = parseFloat(document.getElementById('monto-gasto').value);
            const moneda = document.getElementById('moneda-gasto').value;
            const esCuota = document.getElementById('es-cuota').checked;
            
            if(!nombre || !monto) return alert("Completa los datos");

            const nuevoGasto = {
                id: Date.now(),
                nombre,
                monto,
                moneda,
                esCuota,
                cuotaActual: esCuota ? document.getElementById('cuota-actual').value : null,
                cuotasTotales: esCuota ? document.getElementById('cuotas-totales').value : null
            };

            gastos.push(nuevoGasto);
            localStorage.setItem('mis_gastos', JSON.stringify(gastos));
            limpiarFormulario();
            renderizarGastos();
        }

        function renderizarGastos() {
            const lista = document.getElementById('lista-gastos');
            const totalDisplay = document.getElementById('total-general');
            lista.innerHTML = '';
            let totalARS = 0;

            gastos.forEach(g => {
                const montoConvertido = g.moneda === 'USD' ? g.monto * valorDolar : g.monto;
                totalARS += montoConvertido;

                const cuotasHTML = g.esCuota ? `<span class="text-xs text-blue-500 block">Cuota ${g.cuotaActual}/${g.cuotasTotales}</span>` : '';

                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                        <div>
                            <p class="font-medium text-gray-800">${g.nombre}</p>
                            ${cuotasHTML}
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-gray-900">${g.moneda} ${g.monto.toLocaleString()}</p>
                            <p class="text-[10px] text-gray-400">≈ ARS $${montoConvertido.toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });

            totalDisplay.innerText = `$ ${totalARS.toLocaleString()}`;
        }

        function limpiarFormulario() {
            document.getElementById('nombre-gasto').value = '';
            document.getElementById('monto-gasto').value = '';
            document.getElementById('es-cuota').checked = false;
            toggleCuotas();
        }

        document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString();
        actualizarDolar();
    </script>
</body>
</html>
